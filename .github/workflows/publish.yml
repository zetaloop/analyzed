name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true

jobs:
  crates:
    name: crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        run: rustup update --no-self-update stable

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: |
          members=$(cargo metadata --format-version 1 --no-deps --locked |
            jq -r '.packages[] | select(.publish != []) | "\(.name)@\(.version)"')
          excludes=()
          for spec in $members; do
            name=${spec%@*}
            version=${spec#*@}
            if curl -sf "https://index.crates.io/${name:0:2}/${name:2:2}/$name" |
              jq -se --arg v "$version" 'any(.[]; .vers == $v)' >/dev/null; then
              echo "already published: $spec"
              excludes+=(--exclude "$name")
            fi
          done
          if [ $((${#excludes[@]} / 2)) -eq "$(wc -w <<<"$members")" ]; then
            echo "nothing to publish"
            exit 0
          fi
          cargo publish --workspace --locked "${excludes[@]}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
