[workspace]
members = [
    "crates/analyzed",
    "crates/analyzed-daemon",
    "crates/analyzed-ipc",
    "crates/analyzed-ra",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"

[workspace.dependencies]
analyzed-daemon = { path = "crates/analyzed-daemon" }
analyzed-ipc = { path = "crates/analyzed-ipc" }
analyzed-ra = { path = "crates/analyzed-ra" }

anyhow = "1.0.102"
camino = "1.2.2"
clap = { version = "4.6.1", features = ["derive"] }
daemonize = "0.5.0"
directories = "6.0.0"
fs4 = "1.1.0"
lsp-server = "0.7.9"
lsp-types = "0.95.0"
ra_ap_ide = "0.0.334"
ra_ap_load-cargo = "0.0.334"
ra_ap_proc_macro_api = "0.0.334"
ra_ap_project_model = "0.0.334"
ra_ap_vfs = "0.0.334"
ra_ap_vfs-notify = "0.0.334"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
